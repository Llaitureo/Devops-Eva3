version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: innovatech-project-mysql-1
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_R:-root}
      MYSQL_DATABASE: ${DB_NAME:-innovatech_db}
      MYSQL_USER: ${DB_USERNAME:-innovatech_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-innovatech_pass}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_PASSWORD_R:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  backend-ventas:
    image: innovatech-ventas:${TAG_VERSION:-latest}
    container_name: innovatech-project-backend-ventas
    build: 
      context: ./back-Ventas_SpringBoot/Springboot-API-REST/
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-innovatech_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-innovatech_db}
      DB_USERNAME: ${DB_USERNAME:-innovatech_user}
      DB_PASSWORD: ${DB_PASSWORD:-innovatech_pass}
      SPRING_PROFILES_ACTIVE: test
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/swagger-ui.html"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - app-net
  backend-despachos:
    image: innovatech-despachos:${TAG_VERSION:-latest}
    container_name: innovatech-project-backend-despachos
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-innovatech_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-innovatech_db}
      DB_USERNAME: ${DB_USERNAME:-innovatech_user}
      DB_PASSWORD: ${DB_PASSWORD:-innovatech_pass}
      SPRING_PROFILES_ACTIVE: test
    depends_on:
      mysql:
        condition: service_healthy
      backend-ventas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/swagger-ui.html"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - app-net
  frontend-service:
    image: innovatech-front_despacho:${TAG_VERSION:-latest}
    container_name: innovatech-project-front-despachos
    build: 
        context: ./front_despacho
        dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ENTORNO=local
    depends_on:
      backend-despachos:
        condition: service_healthy
    networks:
      - app-net
volumes:
  mysql_data:

networks:
  app-net:
    driver: bridge