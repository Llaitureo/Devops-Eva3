apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
  labels:
    app: backend-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      # --- CONTENEDOR DE INICIALIZACIÓN (Reemplaza al depends_on) ---
      # Bloquea el inicio de despachos hasta que el servicio de ventas responda en el 8081
      initContainers:
        - name: wait-for-ventas
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend-ventas 8081; do
                echo "Esperando a que el backend de ventas esté listo...";
                sleep 3;
              done;

      containers:
        - name: backend-despachos
          image: imagen-backendDespachos
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-pass
            - name: DB_PORT
              value: "3306"
            # Construimos la URL usando de forma segura la variable $(DB_NAME)
            - name: DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

            # URL del servicio de ventas para que despachos pueda comunicarse con él.
            - name: VENTAS_API_URL
              value: http://backend-ventas:8081

          # --- CONFIGURACIÓN DE HEALTH CHECKS (ACTUATOR) ---
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---

apiVersion: v1
kind: Service
metadata:
  name: backend-despachos
spec:
  selector:
    app: backend-despachos
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP